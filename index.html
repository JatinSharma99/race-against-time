<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Against Time — Case Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#000;color:#fff;
}

body{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
}

.container{
  position:relative;z-index:2;
  text-align:center;
  width:96%;max-width:1500px;
  display:flex;flex-direction:column;
  align-items:center;gap:0;
}

/* Badge */
.badge{
  font-size:11px;
  letter-spacing:8px;
  color:#ff3b3b;
  font-weight:700;
  text-transform:uppercase;
  margin-bottom:14px;
  animation:blink 1.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* Title — single line, no wrap, stays fixed in place */
.title-wrap{
  width:100%;
  overflow:hidden;
  position:relative;
  margin-bottom:10px;
  display:flex;
  justify-content:center;
}
.title{
  font-size:clamp(20px,3.4vw,40px);
  font-weight:900;
  line-height:1.05;
  text-transform:uppercase;
  letter-spacing:3px;
  color:#fff;
  white-space:nowrap;
  text-shadow:0 0 40px rgba(255,0,0,.5),0 0 80px rgba(255,0,0,.2);
  position:relative;
  display:inline-block;
}
.title .red{color:#ff2020;}

/* speeding streak that sweeps left-to-right over the static text */
.title::after{
  content:"";
  position:absolute;
  top:0;
  left:-30%;
  width:35%;
  height:100%;
  background:linear-gradient(
    100deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.55) 50%,
    rgba(255,255,255,0) 100%
  );
  mix-blend-mode:overlay;
  animation:speedSweep 2.4s ease-in-out infinite;
  pointer-events:none;
}

@keyframes speedSweep{
  0%{   left:-30%; opacity:0;   }
  10%{  opacity:1; }
  55%{  left:115%; opacity:1;   }
  65%{  opacity:0; }
  100%{ left:115%; opacity:0;   }
}

/* Subtitle — single line, larger, scrolls left-to-right and back */
.subtitle-wrap{
  width:94%;
  max-width:1100px;
  overflow:hidden;
  margin-bottom:12px;
  position:relative;
  text-align:center;
}
.subtitle{
  font-size:clamp(30px,5.8vw,76px);
  font-weight:700;
  letter-spacing:2px;
  color:#fff;
  white-space:nowrap;
  display:inline-block;
  position:relative;
}

/* Tagline */
.tagline{
  font-size:clamp(9px,1.2vw,14px);
  letter-spacing:5px;
  color:#888;
  text-transform:uppercase;
  margin-bottom:18px;
}

/* Divider */
.divider{
  width:120px;height:1px;
  background:linear-gradient(90deg,transparent,#ff2020,transparent);
  margin-bottom:18px;
}

/* Timer label */
.timer-label{
  font-size:10px;
  letter-spacing:6px;
  color:#ff4444;
  text-transform:uppercase;
  margin-bottom:12px;
}

/* Timer */
.timer{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:0;
  flex-wrap:nowrap;
}

.unit-block{
  display:flex;flex-direction:column;
  align-items:center;
  min-width:clamp(80px,11vw,155px);
}

.num{
  font-size:clamp(50px,10vw,118px);
  font-weight:700;
  font-family:'Courier New',monospace;
  color:#ff1a1a;
  line-height:1;
  filter:drop-shadow(0 0 14px #ff0000cc) drop-shadow(0 0 30px #ff000055);
  transition:transform .08s ease,color .08s ease;
  user-select:none;
}
.num.pop{transform:scale(1.1);color:#ff7777;}

.sep{
  font-size:clamp(38px,8vw,96px);
  color:#550000;
  line-height:1;
  padding:0 clamp(4px,1vw,10px);
  align-self:flex-start;
  margin-top:2px;
  font-weight:900;
  font-family:'Courier New',monospace;
  animation:sepPulse 1s steps(1) infinite;
}
@keyframes sepPulse{0%{opacity:1;}50%{opacity:.15;}}

.unit-name{
  font-size:clamp(9px,1.1vw,13px);
  letter-spacing:4px;
  color:#fff;
  text-transform:uppercase;
  margin-top:6px;
}

/* Footer */
.footer{
  margin-top:22px;
  font-size:10px;
  letter-spacing:5px;
  color:#fff;
  text-transform:uppercase;
}
</style>
</head>
<body>

<div class="container">

  <div class="badge">⬤ &nbsp;Contest Live Now&nbsp; ⬤</div>

  <div class="subtitle-wrap">
    <div class="subtitle">M0 Case Login</div>
  </div>

  <div class="title-wrap">
    <div class="title">Race Against <span class="red">Time</span></div>
  </div>

  <div class="tagline">Every Minute Counts &nbsp;·&nbsp; Every Case Matters</div>

  <div class="divider"></div>

  <div class="timer-label">⏱ &nbsp;M0 Countdown</div>

  <div class="timer">
    <div class="unit-block">
      <div class="num" id="dd">00</div>
      <div class="unit-name">Days</div>
    </div>
    <div class="sep">:</div>
    <div class="unit-block">
      <div class="num" id="hh">00</div>
      <div class="unit-name">Hours</div>
    </div>
    <div class="sep">:</div>
    <div class="unit-block">
      <div class="num" id="mm">00</div>
      <div class="unit-name">Minutes</div>
    </div>
    <div class="sep">:</div>
    <div class="unit-block">
      <div class="num" id="ss">00</div>
      <div class="unit-name">Seconds</div>
    </div>
  </div>

  <div class="footer">Policybazaar &nbsp;·&nbsp; Life CRT Training Team Initiative</div>

</div>

<script>

/* ── COUNTDOWN ── */
const LAUNCH = new Date("2026-06-30T23:59:59").getTime();
const pad = n => String(Math.max(0, n)).padStart(2, '0');
let prevSec = -1;

function flash(id){
  const el = document.getElementById(id);
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 120);
}

function tick(){
  const now  = Date.now();
  const diff = Math.max(0, LAUNCH - now);

  const days = Math.floor(diff / 864e5);
  const hrs  = Math.floor((diff % 864e5) / 36e5);
  const mins = Math.floor((diff % 36e5) / 6e4);
  const secs = Math.floor((diff % 6e4) / 1e3);

  document.getElementById('dd').textContent = pad(days);
  document.getElementById('hh').textContent = pad(hrs);
  document.getElementById('mm').textContent = pad(mins);
  document.getElementById('ss').textContent = pad(secs);

  if(secs !== prevSec){ flash('ss'); prevSec = secs; }
}

tick();
setInterval(tick, 500);

</script>
</body>
</html>
